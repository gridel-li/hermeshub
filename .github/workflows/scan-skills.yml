name: Skill Security Scan

on:
  pull_request:
    paths:
      - 'skills/**'
  push:
    paths:
      - 'skills/**'
    branches:
      - main

jobs:
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Detect changed skills
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
            CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'skills/*/SKILL.md' | head -50)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'skills/*/SKILL.md' 2>/dev/null || echo "")
          fi

          if [ -z "$CHANGED" ]; then
            echo "No SKILL.md files changed, scanning all..."
            echo "scan_target=skills/" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed files:"
            echo "$CHANGED"
            echo "$CHANGED" > /tmp/changed_skills.txt
            echo "scan_target=/tmp/changed_skills.txt" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run security scan (changed files)
        if: steps.changed.outputs.has_changes == 'true'
        id: scan_changed
        run: |
          EXIT_CODE=0
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              python scripts/scan-skill.py "$file" -v || EXIT_CODE=$?
            fi
          done < /tmp/changed_skills.txt
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE
        continue-on-error: true

      - name: Run security scan (all skills)
        if: steps.changed.outputs.has_changes == 'false'
        id: scan_all
        run: |
          python scripts/scan-skill.py skills/ -v
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Run JSON scan for PR comment
        if: github.event_name == 'pull_request'
        id: scan_json
        run: |
          if [ "${{ steps.changed.outputs.has_changes }}" = "true" ]; then
            RESULTS="["
            FIRST=true
            while IFS= read -r file; do
              if [ -f "$file" ]; then
                RESULT=$(python scripts/scan-skill.py "$file" --json 2>/dev/null)
                if [ "$FIRST" = true ]; then
                  FIRST=false
                else
                  RESULTS="$RESULTS,"
                fi
                RESULTS="$RESULTS$RESULT"
              fi
            done < /tmp/changed_skills.txt
            RESULTS="$RESULTS]"
          else
            RESULTS=$(python scripts/scan-skill.py skills/ --json 2>/dev/null)
          fi
          echo "$RESULTS" > /tmp/scan_results.json
        continue-on-error: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results = [];
            try {
              const raw = fs.readFileSync('/tmp/scan_results.json', 'utf8');
              const parsed = JSON.parse(raw);
              results = Array.isArray(parsed[0]) ? parsed.flat() : parsed;
            } catch (e) {
              results = [];
            }

            const icons = { verified: '✅', warning: '⚠️', blocked: '❌' };
            const sevIcons = { critical: '🔴', warning: '🟡', info: '🔵' };

            let body = '## 🔍 HermesHub Security Scan Results\n\n';

            if (results.length === 0) {
              body += 'No SKILL.md files found to scan.\n';
            } else {
              const verified = results.filter(r => r.status === 'verified').length;
              const warnings = results.filter(r => r.status === 'warning').length;
              const blocked = results.filter(r => r.status === 'blocked').length;

              body += `| Status | Count |\n|--------|-------|\n`;
              body += `| ${icons.verified} Verified | ${verified} |\n`;
              body += `| ${icons.warning} Warnings | ${warnings} |\n`;
              body += `| ${icons.blocked} Blocked | ${blocked} |\n\n`;

              for (const r of results) {
                body += `### ${icons[r.status] || '?'} \`${r.file}\` — ${r.status.toUpperCase()}\n\n`;
                if (r.findings.length === 0) {
                  body += 'No issues found.\n\n';
                } else {
                  body += '| Severity | Rule | Finding | Line |\n';
                  body += '|----------|------|---------|------|\n';
                  for (const f of r.findings) {
                    const sev = `${sevIcons[f.severity] || '?'} ${f.severity}`;
                    body += `| ${sev} | ${f.rule_id} | ${f.message} | ${f.line_number || '-'} |\n`;
                  }
                  body += '\n';
                }
              }

              if (blocked > 0) {
                body += '> **⛔ This PR is blocked.** Critical security findings must be resolved before merging.\n';
              } else if (warnings > 0) {
                body += '> **⚠️ Warnings found.** Please review before merging.\n';
              } else {
                body += '> **✅ All skills passed security scanning.**\n';
              }
            }

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c => 
              c.body.includes('HermesHub Security Scan Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail on critical findings
        run: |
          CHANGED_EXIT="${{ steps.scan_changed.outputs.exit_code }}"
          ALL_EXIT="${{ steps.scan_all.outputs.exit_code }}"
          EXIT_CODE="${CHANGED_EXIT:-$ALL_EXIT}"
          EXIT_CODE="${EXIT_CODE:-0}"
          if [ "$EXIT_CODE" = "2" ]; then
            echo "❌ Critical security findings detected. Blocking."
            exit 1
          fi
