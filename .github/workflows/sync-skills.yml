name: Sync Skills Data

# Runs when skills are added/changed on main — auto-updates the website data files
on:
  push:
    branches: [main]
    paths:
      - 'skills/**/SKILL.md'
      - 'scripts/skills-meta.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sync script
        run: node scripts/sync-skills.js

      - name: Regenerate OG image with current skill count
        run: |
          pip install Pillow
          python scripts/generate-og.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated files
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/src/lib/skills-data.ts client/index.html client/public/sitemap.xml client/public/og-image.png
          git commit -m "chore: auto-sync skills data + OG image [skip ci]"
          git push
